image: node:22-alpine

stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  NODE_ENV: test
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

cache:
  paths:
    - .npm/
    - node_modules/

before_script:
  - npm ci
  - npx prisma generate

# Lint Stage
lint:
  stage: lint
  script:
    - npm run lint
    - npx tsc --noEmit
    - npm run format -- --check
  only:
    - merge_requests
    - main
    - develop

# Test Stage
test:unit:
  stage: test
  script:
    - npm run test:cov
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 30 days
  only:
    - merge_requests
    - main
    - develop

# Build Stage
build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - merge_requests
    - main
    - develop

# Security Stage
security:npm-audit:
  stage: security
  script:
    - npm audit --audit-level=moderate
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

security:trivy:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL .
  only:
    - merge_requests
    - main
    - develop

# Docker Build & Push
docker:build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - |
      if [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
        docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
        docker push $CI_REGISTRY_IMAGE:latest
      fi
  only:
    - main
    - develop

# Deploy to Staging
deploy:staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging-marketplace.ekoru.com
  script:
    - echo "Deploying to staging..."
    # Add your deployment commands
  only:
    - develop
  when: manual

# Deploy to Production
deploy:production:
  stage: deploy
  environment:
    name: production
    url: https://marketplace.ekoru.com
  script:
    - echo "Deploying to production..."
    # Add your deployment commands
  only:
    - main
  when: manual

# Database Migration
migrate:production:
  stage: deploy
  script:
    - npx prisma migrate deploy
  environment:
    name: production
  only:
    - main
  when: manual
  dependencies:
    - deploy:production
