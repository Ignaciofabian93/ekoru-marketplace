name: 'ekoru-marketplace-staging'

services:
  ekoru-marketplace-staging:
    image: ekoru-marketplace:staging
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: ekoru-marketplace-staging
    env_file:
      - .env.staging
    ports:
      - '4002:4002'
    networks:
      - ekoru-staging-network
    deploy:
      resources:
        limits:
          cpus: '0.5' # Maximum 0.5 CPU cores (Staging environment)
          memory: 512M # Maximum 512MB RAM (Staging environment)
        reservations:
          cpus: '0.25' # Minimum 0.25 CPU cores reserved
          memory: 256M # Minimum 256MB RAM reserved
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:4002/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ekoru-staging-network:
    external: true
