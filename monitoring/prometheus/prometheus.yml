global:
  scrape_interval: 15s # Scrape targets every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'ekoru-marketplace'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files
# rule_files:
#   - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'ekoru-marketplace-server'

  # Postgres Exporter - Database metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          instance: 'ekoru-marketplace-db'

  # NestJS Application Metrics
  - job_name: 'ekoru-marketplace'
    static_configs:
      - targets: ['host.docker.internal:4002']
        labels:
          service: 'marketplace-api'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # GraphQL Metrics
  - job_name: 'graphql-metrics'
    static_configs:
      - targets: ['host.docker.internal:4002']
        labels:
          service: 'graphql-api'
    metrics_path: '/graphql-metrics'
    scrape_interval: 10s
