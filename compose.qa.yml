services:
  ekoru-marketplace-qa:
    image: ekoru-marketplace:qa
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: ekoru-marketplace-qa
    env_file:
      - .env.qa
    ports:
      - '4002:4002'
    networks:
      - ekoru-network
    deploy:
      resources:
        limits:
          cpus: '0.5' # Maximum 0.5 CPU cores (QA environment)
          memory: 512M # Maximum 512MB RAM (QA environment)
        reservations:
          cpus: '0.25' # Minimum 0.25 CPU cores reserved
          memory: 256M # Minimum 256MB RAM reserved
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:4002/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  ekoru-network:
    external: true
